  <main>
    <section class="page-header">
      <div class="container">
        <h1>&#x1F6E0; TFLシェルビルダー</h1>
        <p>テーブルタイプを選択し、モックTFL（TFLシェル）を簡単に作成</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="grid grid-2" style="gap:2rem;">

          <!-- 入力フォーム -->
          <div>
            <div class="card">
              <h2 style="font-size:1.25rem;margin-bottom:1rem;">シェル設定</h2>
              <div class="shell-builder-form" id="shell-form">

                <div class="form-group">
                  <label for="shell-table-type">テーブルタイプ</label>
                  <select id="shell-table-type">
                    <option value="">-- 選択してください --</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="shell-table-number">テーブル番号</label>
                  <input type="text" id="shell-table-number" placeholder="例: Table 14.3.1.1" value="Table 14.3.1.1">
                </div>

                <div class="form-group">
                  <label for="shell-title">タイトル</label>
                  <input type="text" id="shell-title" placeholder="例: Summary of Adverse Events by SOC and PT">
                </div>

                <div class="form-group">
                  <label for="shell-population">解析対象集団</label>
                  <select id="shell-population">
                    <option value="Full Analysis Set">Full Analysis Set</option>
                    <option value="Safety Analysis Set" selected>Safety Analysis Set</option>
                    <option value="Per Protocol Set">Per Protocol Set</option>
                    <option value="Intent-to-Treat Population">Intent-to-Treat Population</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="shell-columns">カラムヘッダ（カンマ区切り）</label>
                  <input type="text" id="shell-columns" placeholder="例: Drug A N=xxx, Placebo N=xxx, Total N=xxx">
                </div>

                <div class="form-group">
                  <label for="shell-footnotes">脚注（改行で区切り）</label>
                  <textarea id="shell-footnotes" rows="4" placeholder="例:&#10;Source: ADAE&#10;Note: Percentages are based on N in the column heading.&#10;AE = Adverse Event; SOC = System Organ Class"></textarea>
                </div>

                <div class="form-group">
                  <label for="shell-program">プログラム名</label>
                  <input type="text" id="shell-program" placeholder="例: t_ae_summary.sas">
                </div>

                <button class="btn btn-primary btn-lg" onclick="generateShell()" style="width:100%;">プレビューを生成</button>
              </div>
            </div>
          </div>

          <!-- プレビュー -->
          <div>
            <div class="card">
              <div class="flex-between mb-3">
                <h2 style="font-size:1.25rem;margin-bottom:0;">プレビュー</h2>
                <button class="copy-btn" id="copy-btn" onclick="copyShellOutput()">コピー</button>
              </div>
              <div class="shell-output" id="shell-output">
テーブルタイプを選択して「プレビューを生成」をクリックしてください。
              </div>
            </div>

            <!-- 書式ルールリファレンス -->
            <div class="card mt-3">
              <h3 style="font-size:1rem;margin-bottom:0.75rem;">TFLシェルの構成要素</h3>
              <div id="shell-rules">
                <!-- JS で動的生成 -->
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
